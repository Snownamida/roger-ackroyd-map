<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗杰疑案 - 人物关系图 (无剧透)</title>
    <!-- Tailwind is still useful for utility classes in the HTML structure -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <!-- UI Overlay -->
    <div class="absolute top-0 left-0 p-4 z-10 w-full pointer-events-none">
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-amber-500 tracking-wider font-serif">罗杰疑案</h1>
                <h2 class="text-sm md:text-base text-slate-400 italic">The Murder of Roger Ackroyd</h2>
                <p class="text-xs text-slate-500 mt-1">无剧透人物关系图 | Spoiler-Free Character Map</p>
            </div>

            <!-- Legend -->
            <div class="bg-slate-800/80 p-3 rounded-lg border border-slate-700 text-xs md:text-sm backdrop-blur-sm">
                <div class="flex items-center mb-1"><span class="legend-dot bg-red-600"></span>中心人物 (Center)</div>
                <div class="flex items-center mb-1"><span class="legend-dot bg-purple-600"></span>亲属/客人 (Family/Guest)
                </div>
                <div class="flex items-center mb-1"><span class="legend-dot bg-gray-500"></span>家仆/职员 (Staff)</div>
                <div class="flex items-center mb-1"><span class="legend-dot bg-blue-500"></span>侦探/旁观 (Detective/Local)
                </div>
                <div class="flex items-center"><span class="legend-dot" style="background-color: #cbd5e1;"></span>已故/背景
                    (Background)</div>
            </div>
        </div>
        <div class="mt-4 text-xs text-slate-400 bg-slate-800/50 inline-block px-2 py-1 rounded pointer-events-auto">
            <span class="mr-1">💡</span> 提示：拖拽节点整理关系，点击节点查看详情。<br>Tip: Drag nodes to organize, Click for details.
        </div>
    </div>

    <!-- Graph Container -->
    <div id="graph-container"></div>

    <!-- Detail Panel -->
    <div id="info-panel">
        <span class="close-btn">&times;</span>
        <div id="panel-content">
            <h3 id="char-name" class="text-xl font-bold text-amber-400 mb-1">Character Name</h3>
            <p id="char-name-en" class="text-sm text-slate-400 italic mb-3">English Name</p>
            <div class="border-t border-slate-600 my-2"></div>
            <p id="char-desc" class="text-sm leading-relaxed text-slate-200">Description goes here.</p>
            <div class="mt-3">
                <span id="char-role" class="text-xs font-mono bg-slate-700 px-2 py-1 rounded text-slate-300">Role</span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
